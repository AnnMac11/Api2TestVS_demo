<svg width="900" height="460" viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="900" height="460" fill="#1e1e1e"/>
  <rect x="0" y="0" width="900" height="36" fill="#2d2d2d"/>
  <rect x="0" y="0" width="180" height="36" fill="#1e1e1e"/>
  <text x="20" y="23" fill="#cccccc" font-size="12">Data Dictionary</text>
  <text x="160" y="24" fill="#858585" font-size="13">&#215;</text>

  <text x="40" y="78" fill="#ffffff" font-size="22" font-weight="300">Data Dictionary</text>
  <rect x="660" y="58" width="90" height="30" rx="3" fill="#0e639c"/>
  <text x="705" y="78" fill="#ffffff" font-size="12" text-anchor="middle">+ Add Field</text>
  <rect x="760" y="58" width="100" height="30" rx="3" fill="#3c3c3c" stroke="#5a5a5a"/>
  <text x="810" y="78" fill="#cccccc" font-size="12" text-anchor="middle">Import…</text>

  <!-- table header -->
  <rect x="40" y="110" width="820" height="34" fill="#2d2d2d"/>
  <text x="56" y="132" fill="#bbbbbb" font-size="12" font-weight="bold">Field Name</text>
  <text x="240" y="132" fill="#bbbbbb" font-size="12" font-weight="bold">Type</text>
  <text x="360" y="132" fill="#bbbbbb" font-size="12" font-weight="bold">Mandatory</text>
  <text x="500" y="132" fill="#bbbbbb" font-size="12" font-weight="bold">Data Method</text>
  <text x="740" y="132" fill="#bbbbbb" font-size="12" font-weight="bold">Actions</text>

  <!-- rows -->
  <g font-size="12" fill="#cccccc">
    <rect x="40" y="144" width="820" height="34" fill="#1e1e1e"/>
    <text x="56" y="166">petId</text><text x="240" y="166">integer</text><text x="360" y="166" fill="#a6e22e">Yes</text><text x="500" y="166">GenerateRandomId()</text>
    <text x="740" y="166" fill="#75beff">edit</text><text x="784" y="166" fill="#f48771">delete</text>

    <rect x="40" y="178" width="820" height="34" fill="#242424"/>
    <text x="56" y="200">name</text><text x="240" y="200">string</text><text x="360" y="200" fill="#a6e22e">Yes</text><text x="500" y="200">RandomName()</text>
    <text x="740" y="200" fill="#75beff">edit</text><text x="784" y="200" fill="#f48771">delete</text>

    <rect x="40" y="212" width="820" height="34" fill="#1e1e1e"/>
    <text x="56" y="234">status</text><text x="240" y="234">string</text><text x="360" y="234" fill="#cd950c">No</text><text x="500" y="234">PickFrom("available","sold")</text>
    <text x="740" y="234" fill="#75beff">edit</text><text x="784" y="234" fill="#f48771">delete</text>

    <rect x="40" y="246" width="820" height="34" fill="#242424"/>
    <text x="56" y="268">category</text><text x="240" y="268">object</text><text x="360" y="268" fill="#cd950c">No</text><text x="500" y="268">DefaultCategory()</text>
    <text x="740" y="268" fill="#75beff">edit</text><text x="784" y="268" fill="#f48771">delete</text>

    <rect x="40" y="280" width="820" height="34" fill="#1e1e1e"/>
    <text x="56" y="302">quantity</text><text x="240" y="302">integer</text><text x="360" y="302" fill="#a6e22e">Yes</text><text x="500" y="302">RandomInt(1,100)</text>
    <text x="740" y="302" fill="#75beff">edit</text><text x="784" y="302" fill="#f48771">delete</text>
  </g>
  <rect x="40" y="110" width="820" height="208" fill="none" stroke="#3c3c3c"/>

  <text x="40" y="350" fill="#9d9d9d" font-size="12">5 fields · derived from imported PetStore endpoints</text>
</svg>
